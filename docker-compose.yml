# ser2net — example compose deployment.
#   docker compose up -d
# Edit `devices` to match the serial port(s) you are bridging.
services:
  ser2net:
    build: .
    # image: ghcr.io/haliskilic/ser2net:latest   # or pull a published image
    container_name: ser2net
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ser2net-data:/data
    # Pass through the host serial device(s). USB-serial adapters renumber across
    # replug; bind by stable /dev/serial/by-id/... when possible.
    devices:
      - "/dev/ttyUSB0:/dev/ttyUSB0"
    # The serial device is owned by the 'dialout' group on most distros. Map that
    # group's GID (check: `getent group dialout`) so the container may open it.
    group_add:
      - dialout
    environment:
      SER2NET_BIND_IP: "0.0.0.0"
      SER2NET_PORT: "8080"

volumes:
  ser2net-data:
